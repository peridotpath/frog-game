name: Deploy Godot to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show export presets
        run: cat export_presets.cfg

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.2.2
          include-templates: true
          use-dotnet: false
      
      - name: Install export templates
        run: |
          set -e

          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable

          wget https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz

          unzip -q Godot_v4.2.2-stable_export_templates.tpz

          cp -r templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Verify templates
        run: ls ~/.local/share/godot/export_templates/4.2.2.stable

      - name: Export Web Build
        run: |
          rm -rf build
          mkdir -p build
          godot --headless --rendering-driver opengl3 --export-release "WebNoThreads" build/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: export
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4